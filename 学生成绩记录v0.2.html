    <script type="module">
const STAGES = ['小学', '初中', '高中'];
const SEMESTERS = ['上学期', '下学期'];
const RANK_COLUMNS = ['班级排名', '学校排名', '全市排名'];

const DEFAULT_SUBJECT_TEMPLATES = {
  小学: {
    一年级: ['语文', '数学', '英语'],
    二年级: ['语文', '数学', '英语'],
    三年级: ['语文', '数学', '英语'],
    四年级: ['语文', '数学', '英语'],
    五年级: ['语文', '数学', '英语'],
    六年级: ['语文', '数学', '英语'],
  },
  初中: {
    初一: ['语文', '数学', '英语', '历史', '道法', '生物', '地理'],
    初二: ['语文', '数学', '英语', '物理', '历史', '道法', '生物', '地理'],
    初三: ['语文', '数学', '英语', '物理', '化学', '历史', '道法'],
  },
  高中: {
    高一: ['语文', '数学', '英语', '物理', '化学', '历史', '道法', '生物', '地理'],
    高二: ['语文', '数学', '英语', '物理', '化学', '生物'],
    高三: ['语文', '数学', '英语', '物理', '化学', '生物'],
  },
};

const DEFAULT_EXAM_TYPES = ['半期考', '期末考', '单元考'];

const DEFAULT_ENABLED_RANKS = ['班级排名', '学校排名'];

const DEFAULT_SUBJECT_RATIOS = {
  小学: {},
  初中: {
    历史: 0.5,
    政治: 0.5,
    道法: 0.5,
    生物: 0.3,
    地理: 0.3,
    物理: 0.9,
  },
  高中: {},
};

const MAX_RAW_SCORE = 1000;
const MAX_RATIO = 10;

const BASE_TEMPLATE_COLUMNS = [
  '学生姓名',
  '出生年月',
  '阶段',
  '年级',
  '学期',
  '考试类型',
  '考试日期',
  '科目',
  '原始成绩',
  '折算比例',
];

const SUBJECT_RANK_COLUMNS = ['原始成绩排名', '折算后成绩排名'];
const TOTAL_RANK_COLUMNS = ['原始分排名', '折算分排名'];

const EXPORT_COLUMNS = [
  ...BASE_TEMPLATE_COLUMNS,
  ...SUBJECT_RANK_COLUMNS,
  '折算后成绩',
  '原始总分',
  '原始分排名',
  '折算总分',
  '折算分排名',
  ...RANK_COLUMNS,
];

function recommendSemester(date = new Date()) {
  const month = date.getMonth() + 1;
  return month >= 8 || month <= 1 ? '上学期' : '下学期';
}

function recommendStageAndGrade(birthMonth, date = new Date()) {
  if (!birthMonth) {
    return { stage: '小学', grade: '一年级' };
  }

  const birthYear = Number(String(birthMonth).slice(0, 4));
  const birthMonthNumber = Number(String(birthMonth).slice(5, 7));
  const schoolYear = date.getMonth() + 1 >= 9 ? date.getFullYear() : date.getFullYear() - 1;
  let gradeNumber = schoolYear - birthYear - (birthMonthNumber >= 9 ? 6 : 5);
  gradeNumber = Math.min(Math.max(gradeNumber, 1), 12);

  if (gradeNumber <= 6) {
    return { stage: '小学', grade: ['一年级', '二年级', '三年级', '四年级', '五年级', '六年级'][gradeNumber - 1] };
  }

  if (gradeNumber <= 9) {
    return { stage: '初中', grade: ['初一', '初二', '初三'][gradeNumber - 7] };
  }

  return { stage: '高中', grade: ['高一', '高二', '高三'][gradeNumber - 10] };
}

function getSubjectsForGrade(stage, grade, templates = DEFAULT_SUBJECT_TEMPLATES, ratios = DEFAULT_SUBJECT_RATIOS) {
  return (templates[stage]?.[grade] || []).map((name) => ({
    name,
    ratio: ratios[stage]?.[name] ?? 1,
  }));
}

function calculateConvertedScore(rawScore, ratio = 1) {
  return roundScore(Number(rawScore) * Number(ratio));
}

function calculateTotals(subjects) {
  return subjects.reduce(
    (totals, subject) => {
      const rawScore = Number(subject.rawScore || 0);
      const convertedScore =
        subject.convertedScore === undefined
          ? calculateConvertedScore(rawScore, subject.ratio ?? 1)
          : Number(subject.convertedScore || 0);

      return {
        totalRawScore: roundScore(totals.totalRawScore + rawScore),
        totalConvertedScore: roundScore(totals.totalConvertedScore + convertedScore),
      };
    },
    { totalRawScore: 0, totalConvertedScore: 0 },
  );
}

function generateBlankScoreTemplateCsv(options) {
  return rowsToCsv(buildBlankScoreTemplateRows(options));
}

function generateBlankScoreTemplateExcelHtml(options) {
  return rowsToExcelHtml(buildBlankScoreTemplateRows(options), '成绩空模板');
}

function buildBlankScoreTemplateRows(options) {
  const columns = [
    ...BASE_TEMPLATE_COLUMNS,
    ...SUBJECT_RANK_COLUMNS,
    ...TOTAL_RANK_COLUMNS,
    ...normalizeRankColumns(options.enabledRanks),
  ];
  const rows = (options.subjects || []).map((subject) => [
    options.studentName,
    options.birthMonth,
    options.stage,
    options.grade,
    options.semester,
    options.examType,
    options.examDate,
    subject.name,
    '',
    subject.ratio ?? 1,
    '',
    '',
    '',
    '',
    ...normalizeRankColumns(options.enabledRanks).map(() => ''),
  ]);

  return [columns, ...rows];
}

function parseScoreTemplateCsv(csvText) {
  const rows = csvToRows(csvText);
  const [header, ...bodyRows] = rows;
  const errors = [];

  if (!header?.length) {
    return { records: [], errors: [{ row: 1, column: '文件', message: '导入文件为空' }] };
  }

  for (const column of BASE_TEMPLATE_COLUMNS) {
    if (!header.includes(column)) {
      errors.push({ row: 1, column, message: `缺少列：${column}` });
    }
  }

  const rankColumns = header.filter((column) => RANK_COLUMNS.includes(column));
  const groups = new Map();

  bodyRows.forEach((row, bodyIndex) => {
    const rowNumber = bodyIndex + 2;
    if (row.every((value) => String(value || '').trim() === '')) {
      return;
    }

    const item = objectFromRow(header, row);
    const requiredColumns = ['学生姓名', '阶段', '年级', '学期', '考试类型', '考试日期', '科目'];
    for (const column of requiredColumns) {
      if (!String(item[column] || '').trim()) {
        errors.push({ row: rowNumber, column, message: `${column}不能为空` });
      }
    }

    const rawScore = parseNonNegativeNumber(item['原始成绩'], MAX_RAW_SCORE);
    if (rawScore === null) {
      errors.push({ row: rowNumber, column: '原始成绩', message: `原始成绩必须是 0 到 ${MAX_RAW_SCORE} 之间的数字` });
    }

    const ratio = parsePositiveNumber(item['折算比例'] || '1', MAX_RATIO);
    if (ratio === null) {
      errors.push({ row: rowNumber, column: '折算比例', message: `折算比例必须是 0 到 ${MAX_RATIO} 之间的数字` });
    }

    const ranks = {};
    const rawRank = parseOptionalPositiveInteger(item['原始成绩排名']);
    if (rawRank === null) {
      errors.push({ row: rowNumber, column: '原始成绩排名', message: '原始成绩排名必须是正整数' });
    }

    const convertedRank = parseOptionalPositiveInteger(item['折算后成绩排名']);
    if (convertedRank === null) {
      errors.push({ row: rowNumber, column: '折算后成绩排名', message: '折算后成绩排名必须是正整数' });
    }

    const totalRawRank = parseOptionalPositiveInteger(item['原始分排名']);
    if (totalRawRank === null) {
      errors.push({ row: rowNumber, column: '原始分排名', message: '原始分排名必须是正整数' });
    }

    const totalConvertedRank = parseOptionalPositiveInteger(item['折算分排名']);
    if (totalConvertedRank === null) {
      errors.push({ row: rowNumber, column: '折算分排名', message: '折算分排名必须是正整数' });
    }

    for (const rankColumn of rankColumns) {
      const value = String(item[rankColumn] || '').trim();
      if (!value) {
        continue;
      }

      const parsedRank = Number(value);
      if (!Number.isInteger(parsedRank) || parsedRank <= 0) {
        errors.push({ row: rowNumber, column: rankColumn, message: `${rankColumn}必须是正整数` });
      } else {
        ranks[rankColumn] = parsedRank;
      }
    }

    if (rawScore === null || ratio === null) {
      return;
    }

    const stage = item['阶段'];
    const grade = item['年级'];
    const subjectName = item['科目'];
    const allowedSubjects = getSubjectsForGrade(stage, grade).map((subject) => subject.name);
    if (!STAGES.includes(stage)) {
      errors.push({ row: rowNumber, column: '阶段', message: '阶段不在允许范围内' });
    }
    if (!Object.hasOwn(DEFAULT_SUBJECT_TEMPLATES[stage] || {}, grade)) {
      errors.push({ row: rowNumber, column: '年级', message: '年级不在当前阶段范围内' });
    }
    if (!SEMESTERS.includes(item['学期'])) {
      errors.push({ row: rowNumber, column: '学期', message: '学期不在允许范围内' });
    }
    if (!isIsoDate(item['考试日期'])) {
      errors.push({ row: rowNumber, column: '考试日期', message: '考试日期必须是 YYYY-MM-DD 格式' });
    }
    if (allowedSubjects.length && !allowedSubjects.includes(subjectName)) {
      errors.push({ row: rowNumber, column: '科目', message: '科目不在当前年级科目模板中' });
    }

    const key = [
      item['学生姓名'],
      item['出生年月'],
      stage,
      grade,
      item['学期'],
      item['考试类型'],
      item['考试日期'],
    ].join('::');

    if (!groups.has(key)) {
      groups.set(key, {
        studentName: item['学生姓名'],
        birthMonth: item['出生年月'],
        stage: item['阶段'],
        grade: item['年级'],
        semester: item['学期'],
        examType: item['考试类型'],
        examDate: item['考试日期'],
        subjects: [],
        ranks: {},
        totalRanks: {},
      });
    }

    const group = groups.get(key);
    if (group.subjects.some((subject) => subject.name === subjectName)) {
      errors.push({ row: rowNumber, column: '科目', message: '同一次考试中科目重复' });
    }
    for (const [rankColumn, rankValue] of Object.entries(ranks)) {
      if (group.ranks[rankColumn] !== undefined && group.ranks[rankColumn] !== rankValue) {
        errors.push({ row: rowNumber, column: rankColumn, message: `${rankColumn}不一致` });
      }
      group.ranks[rankColumn] = rankValue;
    }
    if (totalRawRank !== undefined) {
      if (group.totalRanks.rawRank !== undefined && group.totalRanks.rawRank !== totalRawRank) {
        errors.push({ row: rowNumber, column: '原始分排名', message: '原始分排名不一致' });
      }
      group.totalRanks.rawRank = totalRawRank;
    }
    if (totalConvertedRank !== undefined) {
      if (group.totalRanks.convertedRank !== undefined && group.totalRanks.convertedRank !== totalConvertedRank) {
        errors.push({ row: rowNumber, column: '折算分排名', message: '折算分排名不一致' });
      }
      group.totalRanks.convertedRank = totalConvertedRank;
    }
    group.subjects.push({
      name: subjectName,
      rawScore,
      ratio,
      convertedScore: calculateConvertedScore(rawScore, ratio),
      ...(rawRank !== undefined ? { rawRank } : {}),
      ...(convertedRank !== undefined ? { convertedRank } : {}),
    });
  });

  if (errors.length) {
    return { records: [], errors };
  }

  const records = Array.from(groups.values()).map((record) => ({
    ...record,
    ...calculateTotals(record.subjects),
  }));

  return { records, errors: [] };
}

function exportRecordsToCsv(records) {
  return rowsToCsv(buildExportRows(records));
}

function exportRecordsToExcelHtml(records) {
  return rowsToExcelHtml(buildExportRows(records), '成绩导出');
}

function buildExportRows(records) {
  const rows = [EXPORT_COLUMNS];

  for (const record of records) {
    const totals =
      record.totalRawScore === undefined || record.totalConvertedScore === undefined
        ? calculateTotals(record.subjects || [])
        : {
            totalRawScore: record.totalRawScore,
            totalConvertedScore: record.totalConvertedScore,
          };

    for (const subject of record.subjects || []) {
      const convertedScore =
        subject.convertedScore === undefined
          ? calculateConvertedScore(subject.rawScore, subject.ratio)
          : subject.convertedScore;

      rows.push([
        record.studentName,
        record.birthMonth,
        record.stage,
        record.grade,
        record.semester,
        record.examType,
        record.examDate,
        subject.name,
        subject.rawScore,
        subject.ratio,
        subject.rawRank ?? '',
        subject.convertedRank ?? '',
        convertedScore,
        totals.totalRawScore,
        record.totalRanks?.rawRank ?? '',
        totals.totalConvertedScore,
        record.totalRanks?.convertedRank ?? '',
        ...RANK_COLUMNS.map((rankColumn) => record.ranks?.[rankColumn] ?? ''),
      ]);
    }
  }

  return rows;
}

function createScoreRecord(input) {
  const subjects = (input.subjects || []).map((subject) => {
    const rawScore = assertScoreNumber(subject.rawScore ?? 0, '原始成绩');
    const ratio = assertRatioNumber(subject.ratio ?? 1);
    return {
      name: String(subject.name || '').trim(),
      rawScore,
      ratio,
      convertedScore: calculateConvertedScore(rawScore, ratio),
      ...(subject.rawRank ? { rawRank: assertRankNumber(subject.rawRank, '原始成绩排名') } : {}),
      ...(subject.convertedRank ? { convertedRank: assertRankNumber(subject.convertedRank, '折算后成绩排名') } : {}),
    };
  });
  const totals = calculateTotals(subjects);
  const now = new Date().toISOString();

  return {
    id: input.id || createId('score'),
    studentId: input.studentId,
    studentName: input.studentName,
    birthMonth: input.birthMonth || '',
    stage: input.stage,
    grade: input.grade,
    semester: input.semester,
    examType: input.examType,
    examDate: input.examDate,
    subjects,
    ranks: input.ranks || {},
    totalRanks: normalizeTotalRanks(input.totalRanks),
    totalRawScore: totals.totalRawScore,
    totalConvertedScore: totals.totalConvertedScore,
    createdAt: input.createdAt || now,
    updatedAt: now,
  };
}

function analyzeTrend(records, mode = { type: 'all' }) {
  const sortedRecords = [...records].sort((a, b) => String(a.examDate).localeCompare(String(b.examDate)));
  if (sortedRecords.length < 2) {
    return {
      summary: '记录不足，至少需要两次同阶段考试才能判断趋势。',
      improvements: [],
      declines: [],
      suggestions: ['先持续记录两次以上考试，再观察变化。'],
      points: sortedRecords.map((record) => ({ label: record.examDate, value: record.totalConvertedScore })),
    };
  }

  const getValue = (record) => {
    if (mode.type === 'subject') {
      return record.subjects.find((subject) => subject.name === mode.subject)?.convertedScore ?? null;
    }
    return record.totalConvertedScore;
  };

  const points = sortedRecords
    .map((record) => ({ label: record.examDate, value: getValue(record), examType: record.examType }))
    .filter((point) => point.value !== null);

  if (points.length < 2) {
    return {
      summary: '该科目记录不足，暂时无法判断趋势。',
      improvements: [],
      declines: [],
      suggestions: ['后续考试继续录入该科成绩后再分析。'],
      points,
    };
  }

  const first = points[0].value;
  const last = points.at(-1).value;
  const delta = roundScore(last - first);
  const summary =
    delta > 0
      ? `整体提升 ${delta} 分，趋势向好。`
      : delta < 0
        ? `整体下降 ${Math.abs(delta)} 分，需要关注波动。`
        : '整体保持稳定，可以继续巩固。';

  const subjectChanges = collectSubjectChanges(sortedRecords, mode);
  const improvements = subjectChanges.filter((item) => item.delta > 0).sort((a, b) => b.delta - a.delta);
  const declines = subjectChanges.filter((item) => item.delta < 0).sort((a, b) => a.delta - b.delta);
  const suggestions = [
    improvements[0] ? `继续保持 ${improvements[0].name} 的学习节奏。` : '保持稳定作息和复盘节奏。',
    declines[0] ? `${declines[0].name} 近期下降较明显，建议安排专项错题复盘。` : '暂无明显退步科目，可重点巩固薄弱知识点。',
  ];

  return { summary, improvements, declines, suggestions, points };
}

function createId(prefix) {
  return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
}

function todayString(date = new Date()) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function formatStudentStatusLabel(students = []) {
  if (!students.length) {
    return '学生 0';
  }

  const firstName = students[0]?.name || '学生';
  return students.length === 1 ? firstName : `${firstName} 等 ${students.length} 人`;
}

function formatScoreRecordTitle(record, sequence) {
  const rawRank = record.totalRanks?.rawRank ?? '-';
  const convertedRank = record.totalRanks?.convertedRank ?? '-';
  return `${sequence}. ${record.studentName} · ${record.examType} · ${record.totalConvertedScore} 分 · 原始总分排名 ${rawRank} · 折算总分排名 ${convertedRank}`;
}

function findDuplicateScore(records = [], candidate = {}) {
  return records.find((record) => {
    if (candidate.id && record.id === candidate.id) {
      return false;
    }
    return (
      record.studentId === candidate.studentId &&
      record.stage === candidate.stage &&
      record.grade === candidate.grade &&
      record.semester === candidate.semester &&
      record.examType === candidate.examType &&
      record.examDate === candidate.examDate
    );
  }) || null;
}

function validateBackupPayload(payload) {
  const errors = [];
  if (!payload || typeof payload !== 'object') {
    return { ok: false, errors: ['备份文件必须是 JSON 对象'], payload: null, summary: null };
  }
  if (payload.version !== 1) {
    errors.push('version 必须等于 1');
  }
  if (!Array.isArray(payload.students)) {
    errors.push('students 必须是数组');
  }
  if (!Array.isArray(payload.scores)) {
    errors.push('scores 必须是数组');
  }

  const students = Array.isArray(payload.students) ? payload.students.map((student, index) => validateStudentBackup(student, index, errors)) : [];
  const studentIds = new Set(students.filter(Boolean).map((student) => student.id));
  const scores = Array.isArray(payload.scores) ? payload.scores.map((score, index) => validateScoreBackup(score, index, studentIds, errors)) : [];
  const settings = validateSettingsBackup(payload.settings, errors);

  if (errors.length) {
    return { ok: false, errors, payload: null, summary: null };
  }

  return {
    ok: true,
    errors: [],
    payload: {
      version: 1,
      exportedAt: isNonEmptyString(payload.exportedAt) ? payload.exportedAt : new Date().toISOString(),
      students,
      scores,
      settings,
    },
    summary: {
      students: students.length,
      scores: scores.length,
      exportedAt: payload.exportedAt || '',
    },
  };
}

function validateStudentBackup(student, index, errors) {
  const path = `students[${index}]`;
  if (!student || typeof student !== 'object') {
    errors.push(`${path} 必须是对象`);
    return null;
  }
  if (!isSafeId(student.id)) {
    errors.push(`${path}.id 格式不安全`);
  }
  if (!isReasonableText(student.name, 1, 60)) {
    errors.push(`${path}.name 必须是 1 到 60 个字符`);
  }
  if (student.birthMonth && !/^\d{4}-\d{2}$/.test(student.birthMonth)) {
    errors.push(`${path}.birthMonth 必须是 YYYY-MM 格式`);
  }
  if (!STAGES.includes(student.currentStage)) {
    errors.push(`${path}.currentStage 不在允许范围内`);
  }
  if (!Object.hasOwn(DEFAULT_SUBJECT_TEMPLATES[student.currentStage] || {}, student.currentGrade)) {
    errors.push(`${path}.currentGrade 不在当前阶段范围内`);
  }
  return {
    id: String(student.id || ''),
    name: String(student.name || '').trim(),
    gender: isReasonableText(student.gender, 0, 20) ? String(student.gender || '') : '其他',
    birthMonth: String(student.birthMonth || ''),
    currentStage: student.currentStage,
    currentGrade: student.currentGrade,
    createdAt: isNonEmptyString(student.createdAt) ? student.createdAt : new Date().toISOString(),
    updatedAt: isNonEmptyString(student.updatedAt) ? student.updatedAt : new Date().toISOString(),
  };
}

function validateScoreBackup(score, index, studentIds, errors) {
  const path = `scores[${index}]`;
  if (!score || typeof score !== 'object') {
    errors.push(`${path} 必须是对象`);
    return null;
  }
  if (!isSafeId(score.id)) {
    errors.push(`${path}.id 格式不安全`);
  }
  if (!studentIds.has(score.studentId)) {
    errors.push(`${path}.studentId 没有对应学生`);
  }
  if (!STAGES.includes(score.stage)) {
    errors.push(`${path}.stage 不在允许范围内`);
  }
  if (!Object.hasOwn(DEFAULT_SUBJECT_TEMPLATES[score.stage] || {}, score.grade)) {
    errors.push(`${path}.grade 不在当前阶段范围内`);
  }
  if (!SEMESTERS.includes(score.semester)) {
    errors.push(`${path}.semester 不在允许范围内`);
  }
  if (!isReasonableText(score.examType, 1, 40)) {
    errors.push(`${path}.examType 必须是 1 到 40 个字符`);
  }
  if (!isIsoDate(score.examDate)) {
    errors.push(`${path}.examDate 必须是 YYYY-MM-DD 格式`);
  }
  if (!Array.isArray(score.subjects) || !score.subjects.length) {
    errors.push(`${path}.subjects 必须是非空数组`);
  }

  const allowedSubjects = getSubjectsForGrade(score.stage, score.grade).map((subject) => subject.name);
  const seenSubjects = new Set();
  const subjects = Array.isArray(score.subjects)
    ? score.subjects.map((subject, subjectIndex) => {
        const subjectPath = `${path}.subjects[${subjectIndex}]`;
        if (!subject || typeof subject !== 'object') {
          errors.push(`${subjectPath} 必须是对象`);
          return null;
        }
        if (!isReasonableText(subject.name, 1, 40)) {
          errors.push(`${subjectPath}.name 必须是 1 到 40 个字符`);
        }
        if (seenSubjects.has(subject.name)) {
          errors.push(`${subjectPath}.name 科目重复`);
        }
        seenSubjects.add(subject.name);
        if (allowedSubjects.length && !allowedSubjects.includes(subject.name)) {
          errors.push(`${subjectPath}.name 不在当前年级科目模板中`);
        }
        const rawScore = parseNonNegativeNumber(subject.rawScore, MAX_RAW_SCORE);
        const ratio = parsePositiveNumber(subject.ratio ?? 1, MAX_RATIO);
        if (rawScore === null) {
          errors.push(`${subjectPath}.rawScore 必须是 0 到 ${MAX_RAW_SCORE} 之间的数字`);
        }
        if (ratio === null) {
          errors.push(`${subjectPath}.ratio 必须是 0 到 ${MAX_RATIO} 之间的数字`);
        }
        const rawRank = parseOptionalPositiveInteger(subject.rawRank);
        const convertedRank = parseOptionalPositiveInteger(subject.convertedRank);
        if (rawRank === null) errors.push(`${subjectPath}.rawRank 必须是正整数`);
        if (convertedRank === null) errors.push(`${subjectPath}.convertedRank 必须是正整数`);
        return {
          name: String(subject.name || '').trim(),
          rawScore: rawScore ?? 0,
          ratio: ratio ?? 1,
          ...(rawRank ? { rawRank } : {}),
          ...(convertedRank ? { convertedRank } : {}),
        };
      }).filter(Boolean)
    : [];

  const ranks = validateRanksBackup(score.ranks, `${path}.ranks`, errors);
  const totalRanks = validateTotalRanksBackup(score.totalRanks, `${path}.totalRanks`, errors);
  const record = createScoreRecord({
    id: score.id,
    studentId: score.studentId,
    studentName: score.studentName,
    birthMonth: score.birthMonth,
    stage: score.stage,
    grade: score.grade,
    semester: score.semester,
    examType: score.examType,
    examDate: score.examDate,
    subjects,
    ranks,
    totalRanks,
    createdAt: score.createdAt,
  });
  return {
    ...record,
    updatedAt: isNonEmptyString(score.updatedAt) ? score.updatedAt : record.updatedAt,
  };
}

function validateSettingsBackup(settings, errors) {
  if (!settings || typeof settings !== 'object') {
    return {
      examTypes: DEFAULT_EXAM_TYPES,
      enabledRanks: DEFAULT_ENABLED_RANKS,
      subjectTemplates: structuredClone(DEFAULT_SUBJECT_TEMPLATES),
      subjectRatios: structuredClone(DEFAULT_SUBJECT_RATIOS),
    };
  }
  const examTypes = Array.isArray(settings.examTypes)
    ? settings.examTypes.filter((item) => isReasonableText(item, 1, 40)).map((item) => String(item).trim())
    : DEFAULT_EXAM_TYPES;
  const enabledRanks = Array.isArray(settings.enabledRanks)
    ? settings.enabledRanks.filter((rank) => RANK_COLUMNS.includes(rank))
    : DEFAULT_ENABLED_RANKS;
  return {
    examTypes: examTypes.length ? examTypes : DEFAULT_EXAM_TYPES,
    enabledRanks: enabledRanks.length ? enabledRanks : DEFAULT_ENABLED_RANKS,
    subjectTemplates: validateSubjectTemplates(settings.subjectTemplates, errors),
    subjectRatios: validateSubjectRatios(settings.subjectRatios, errors),
  };
}

function validateSubjectTemplates(value, errors) {
  if (value === undefined) {
    return structuredClone(DEFAULT_SUBJECT_TEMPLATES);
  }
  if (!value || typeof value !== 'object') {
    errors.push('settings.subjectTemplates 必须是对象');
    return structuredClone(DEFAULT_SUBJECT_TEMPLATES);
  }
  const templates = structuredClone(DEFAULT_SUBJECT_TEMPLATES);
  for (const stage of STAGES) {
    if (!value[stage] || typeof value[stage] !== 'object') continue;
    for (const grade of Object.keys(templates[stage])) {
      if (Array.isArray(value[stage][grade])) {
        const subjects = value[stage][grade].filter((subject) => isReasonableText(subject, 1, 40)).map((subject) => String(subject).trim());
        if (subjects.length) templates[stage][grade] = subjects;
      }
    }
  }
  return templates;
}

function validateSubjectRatios(value, errors) {
  if (value === undefined) {
    return structuredClone(DEFAULT_SUBJECT_RATIOS);
  }
  if (!value || typeof value !== 'object') {
    errors.push('settings.subjectRatios 必须是对象');
    return structuredClone(DEFAULT_SUBJECT_RATIOS);
  }
  const ratios = structuredClone(DEFAULT_SUBJECT_RATIOS);
  for (const stage of STAGES) {
    if (!value[stage] || typeof value[stage] !== 'object') continue;
    ratios[stage] = ratios[stage] || {};
    for (const [subject, ratioValue] of Object.entries(value[stage])) {
      const ratio = parsePositiveNumber(ratioValue, MAX_RATIO);
      if (isReasonableText(subject, 1, 40) && ratio !== null) {
        ratios[stage][subject] = ratio;
      }
    }
  }
  return ratios;
}

function validateRanksBackup(ranks, path, errors) {
  if (!ranks) return {};
  if (typeof ranks !== 'object' || Array.isArray(ranks)) {
    errors.push(`${path} 必须是对象`);
    return {};
  }
  const normalized = {};
  for (const rankColumn of RANK_COLUMNS) {
    if (ranks[rankColumn] === undefined || ranks[rankColumn] === '') continue;
    const rank = parseOptionalPositiveInteger(ranks[rankColumn]);
    if (!rank) {
      errors.push(`${path}.${rankColumn} 必须是正整数`);
    } else {
      normalized[rankColumn] = rank;
    }
  }
  return normalized;
}

function validateTotalRanksBackup(totalRanks, path, errors) {
  if (!totalRanks) return {};
  if (typeof totalRanks !== 'object' || Array.isArray(totalRanks)) {
    errors.push(`${path} 必须是对象`);
    return {};
  }
  return normalizeTotalRanks(totalRanks, path, errors);
}

function normalizeTotalRanks(totalRanks = {}, path = 'totalRanks', errors = null) {
  const normalized = {};
  if (totalRanks.rawRank !== undefined && totalRanks.rawRank !== '') {
    const rawRank = parseOptionalPositiveInteger(totalRanks.rawRank);
    if (!rawRank) {
      errors?.push(`${path}.rawRank 必须是正整数`);
    } else {
      normalized.rawRank = rawRank;
    }
  }
  if (totalRanks.convertedRank !== undefined && totalRanks.convertedRank !== '') {
    const convertedRank = parseOptionalPositiveInteger(totalRanks.convertedRank);
    if (!convertedRank) {
      errors?.push(`${path}.convertedRank 必须是正整数`);
    } else {
      normalized.convertedRank = convertedRank;
    }
  }
  return normalized;
}

function collectSubjectChanges(records, mode = { type: 'all' }) {
  const first = records[0];
  const last = records.at(-1);
  const changes = [];

  for (const firstSubject of first.subjects || []) {
    if (mode.type === 'subject' && firstSubject.name !== mode.subject) {
      continue;
    }
    const lastSubject = last.subjects?.find((subject) => subject.name === firstSubject.name);
    if (!lastSubject) {
      continue;
    }

    changes.push({
      name: firstSubject.name,
      from: firstSubject.convertedScore,
      to: lastSubject.convertedScore,
      delta: roundScore(lastSubject.convertedScore - firstSubject.convertedScore),
    });
  }

  return changes;
}

function normalizeRankColumns(enabledRanks = []) {
  return RANK_COLUMNS.filter((column) => enabledRanks.includes(column));
}

function assertScoreNumber(value, label) {
  const number = Number(value);
  if (!Number.isFinite(number) || number < 0 || number > MAX_RAW_SCORE) {
    throw new Error(`${label}必须是 0 到 ${MAX_RAW_SCORE} 之间的数字`);
  }
  return number;
}

function assertRatioNumber(value) {
  const number = Number(value);
  if (!Number.isFinite(number) || number <= 0 || number > MAX_RATIO) {
    throw new Error(`折算比例必须是 0 到 ${MAX_RATIO} 之间的数字`);
  }
  return number;
}

function assertRankNumber(value, label) {
  const number = Number(value);
  if (!Number.isInteger(number) || number <= 0) {
    throw new Error(`${label}必须是正整数`);
  }
  return number;
}

function isIsoDate(value) {
  if (!/^\d{4}-\d{2}-\d{2}$/.test(String(value || ''))) {
    return false;
  }
  const date = new Date(`${value}T00:00:00`);
  return Number.isFinite(date.getTime()) && todayString(date) === value;
}

function isSafeId(value) {
  return /^[A-Za-z0-9_-]{1,100}$/.test(String(value || ''));
}

function isReasonableText(value, minLength, maxLength) {
  const text = String(value ?? '').trim();
  return text.length >= minLength && text.length <= maxLength;
}

function isNonEmptyString(value) {
  return typeof value === 'string' && value.trim().length > 0;
}

function parseNonNegativeNumber(value, max = Number.POSITIVE_INFINITY) {
  const normalized = String(value ?? '').trim();
  if (!normalized) {
    return null;
  }

  const number = Number(normalized);
  return Number.isFinite(number) && number >= 0 && number <= max ? number : null;
}

function parsePositiveNumber(value, max = Number.POSITIVE_INFINITY) {
  const number = Number(String(value ?? '').trim());
  return Number.isFinite(number) && number > 0 && number <= max ? number : null;
}

function parseOptionalPositiveInteger(value) {
  const normalized = String(value ?? '').trim();
  if (!normalized) {
    return undefined;
  }

  const number = Number(normalized);
  return Number.isInteger(number) && number > 0 ? number : null;
}

function objectFromRow(header, row) {
  return Object.fromEntries(header.map((column, index) => [column, String(row[index] ?? '').trim()]));
}

function roundScore(value) {
  return Math.round(Number(value || 0) * 100) / 100;
}

function rowsToCsv(rows) {
  return rows.map((row) => row.map(escapeCsvValue).join(',')).join('\n');
}

function rowsToExcelHtml(rows, title) {
  const htmlRows = rows
    .map((row, rowIndex) => {
      const tag = rowIndex === 0 ? 'th' : 'td';
      return `<tr>${row.map((value) => `<${tag}>${escapeExcelHtmlValue(value)}</${tag}>`).join('')}</tr>`;
    })
    .join('');
  return `<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      table { border-collapse: collapse; font-family: "Microsoft YaHei", Arial, sans-serif; }
      th, td { border: 1px solid #d8dee9; padding: 6px 10px; mso-number-format:"\\@"; }
      th { background: #eff6ff; font-weight: 700; }
    </style>
  </head>
  <body>
    <table>
      <caption>${escapeExcelHtmlValue(title)}</caption>
      ${htmlRows}
    </table>
  </body>
</html>`;
}

function escapeCsvValue(value) {
  const text = neutralizeSpreadsheetFormula(String(value ?? ''));
  if (/[",\n\r]/.test(text)) {
    return `"${text.replaceAll('"', '""')}"`;
  }
  return text;
}

function escapeExcelHtmlValue(value) {
  return neutralizeSpreadsheetFormula(String(value ?? ''))
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function neutralizeSpreadsheetFormula(text) {
  return /^[\s]*[=+\-@]/.test(text) ? `'${text}` : text;
}

function csvToRows(text) {
  const rows = [];
  let row = [];
  let value = '';
  let inQuotes = false;

  for (let index = 0; index < text.length; index += 1) {
    const char = text[index];
    const next = text[index + 1];

    if (char === '"' && inQuotes && next === '"') {
      value += '"';
      index += 1;
      continue;
    }

    if (char === '"') {
      inQuotes = !inQuotes;
      continue;
    }

    if (char === ',' && !inQuotes) {
      row.push(value);
      value = '';
      continue;
    }

    if ((char === '\n' || char === '\r') && !inQuotes) {
      if (char === '\r' && next === '\n') {
        index += 1;
      }
      row.push(value);
      rows.push(row);
      row = [];
      value = '';
      continue;
    }

    value += char;
  }

  row.push(value);
  rows.push(row);

  return rows
    .map((currentRow) => currentRow.map((cell, cellIndex) => (cellIndex === 0 ? cell.replace(/^\uFEFF/, '') : cell)))
    .filter((currentRow) => currentRow.some((cell) => String(cell).trim() !== ''));
}


const DB_NAME = 'fuzhou-academic-record';
const DB_VERSION = 1;
const FALLBACK_PREFIX = 'academic-record-single-file:';

const DEFAULT_SETTINGS = {
  examTypes: DEFAULT_EXAM_TYPES,
  enabledRanks: DEFAULT_ENABLED_RANKS,
  subjectTemplates: DEFAULT_SUBJECT_TEMPLATES,
  subjectRatios: DEFAULT_SUBJECT_RATIOS,
};

let dbPromise;
let forceFallbackStorage = false;
let fallbackStorage;
const memoryFallbackStores = {
  students: {},
  scores: {},
  settings: {},
  drafts: {},
};

function openDatabase() {
  if (dbPromise) {
    return dbPromise;
  }

  dbPromise = new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);

    request.onupgradeneeded = () => {
      const db = request.result;
      if (!db.objectStoreNames.contains('students')) {
        db.createObjectStore('students', { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains('scores')) {
        const scoreStore = db.createObjectStore('scores', { keyPath: 'id' });
        scoreStore.createIndex('studentId', 'studentId');
        scoreStore.createIndex('stage', 'stage');
        scoreStore.createIndex('examDate', 'examDate');
      }
      if (!db.objectStoreNames.contains('settings')) {
        db.createObjectStore('settings', { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains('drafts')) {
        db.createObjectStore('drafts', { keyPath: 'id' });
      }
    };

    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });

  return dbPromise;
}

async function getAll(storeName) {
  if (usesFallbackStorage()) {
    return fallbackGetAll(storeName);
  }
  try {
    const db = await openDatabase();
    return requestToPromise(db.transaction(storeName).objectStore(storeName).getAll());
  } catch (error) {
    activateFallbackStorage();
    return fallbackGetAll(storeName);
  }
}

async function putItem(storeName, item) {
  if (usesFallbackStorage()) {
    return fallbackPutItem(storeName, item);
  }
  try {
    const db = await openDatabase();
    const tx = db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).put(item);
    await txDone(tx);
    return item;
  } catch (error) {
    activateFallbackStorage();
    return fallbackPutItem(storeName, item);
  }
}

async function deleteItem(storeName, id) {
  if (usesFallbackStorage()) {
    fallbackDeleteItem(storeName, id);
    return;
  }
  try {
    const db = await openDatabase();
    const tx = db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).delete(id);
    await txDone(tx);
  } catch (error) {
    activateFallbackStorage();
    fallbackDeleteItem(storeName, id);
  }
}

async function getItem(storeName, id) {
  if (usesFallbackStorage()) {
    return fallbackGetItem(storeName, id);
  }
  try {
    const db = await openDatabase();
    return requestToPromise(db.transaction(storeName).objectStore(storeName).get(id));
  } catch (error) {
    activateFallbackStorage();
    return fallbackGetItem(storeName, id);
  }
}

async function clearStore(storeName) {
  if (usesFallbackStorage()) {
    fallbackClearStore(storeName);
    return;
  }
  try {
    const db = await openDatabase();
    const tx = db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).clear();
    await txDone(tx);
  } catch (error) {
    activateFallbackStorage();
    fallbackClearStore(storeName);
  }
}

async function getSettings() {
  const stored = await getItem('settings', 'main');
  return stored ? stored.value : structuredClone(DEFAULT_SETTINGS);
}

async function saveSettings(settings) {
  await putItem('settings', { id: 'main', value: settings });
  return settings;
}

async function restoreDefaultSettings() {
  const settings = structuredClone(DEFAULT_SETTINGS);
  await saveSettings(settings);
  return settings;
}

async function exportBackup() {
  const [students, scores, settings] = await Promise.all([
    getAll('students'),
    getAll('scores'),
    getSettings(),
  ]);

  return {
    version: 1,
    exportedAt: new Date().toISOString(),
    students,
    scores,
    settings,
  };
}

async function importBackup(payload) {
  const validation = validateBackupPayload(payload);
  if (!validation.ok) {
    throw new Error(`备份文件格式不正确：${validation.errors.slice(0, 5).join('；')}`);
  }
  const safePayload = validation.payload;

  if (usesFallbackStorage()) {
    fallbackReplaceAll({
      students: Object.fromEntries(safePayload.students.map((student) => [student.id, student])),
      scores: Object.fromEntries(safePayload.scores.map((score) => [score.id, score])),
      settings: { main: { id: 'main', value: safePayload.settings || structuredClone(DEFAULT_SETTINGS) } },
    });
    return;
  }

  try {
    const db = await openDatabase();
    const tx = db.transaction(['students', 'scores', 'settings'], 'readwrite');
    tx.objectStore('students').clear();
    tx.objectStore('scores').clear();
    tx.objectStore('settings').put({
      id: 'main',
      value: safePayload.settings || structuredClone(DEFAULT_SETTINGS),
    });
    for (const student of safePayload.students) {
      tx.objectStore('students').put(student);
    }
    for (const score of safePayload.scores) {
      tx.objectStore('scores').put(score);
    }
    await txDone(tx);
  } catch (error) {
    activateFallbackStorage();
    await importBackup(safePayload);
  }
}

function getStorageStatus() {
  if (usesFallbackStorage()) {
    return getFallbackStorage() ? { type: 'localStorage', persistent: true } : { type: 'memory', persistent: false };
  }
  return { type: 'indexedDB', persistent: true };
}

function usesFallbackStorage() {
  return forceFallbackStorage || typeof indexedDB === 'undefined' || getLocationProtocol() === 'file:';
}

function activateFallbackStorage() {
  forceFallbackStorage = true;
  dbPromise = null;
}

function getLocationProtocol() {
  return typeof window === 'undefined' ? '' : window.location?.protocol || '';
}

function fallbackGetAll(storeName) {
  return Object.values(readFallbackStore(storeName));
}

function fallbackPutItem(storeName, item) {
  const store = readFallbackStore(storeName);
  store[item.id] = item;
  writeFallbackStore(storeName, store);
  return item;
}

function fallbackDeleteItem(storeName, id) {
  const store = readFallbackStore(storeName);
  delete store[id];
  writeFallbackStore(storeName, store);
}

function fallbackGetItem(storeName, id) {
  return readFallbackStore(storeName)[id];
}

function fallbackClearStore(storeName) {
  writeFallbackStore(storeName, {});
}

function fallbackReplaceAll(stores) {
  const storage = getFallbackStorage();
  if (!storage) {
    for (const [storeName, store] of Object.entries(stores)) {
      memoryFallbackStores[storeName] = store;
    }
    return;
  }

  const tempKeys = [];
  try {
    for (const [storeName, store] of Object.entries(stores)) {
      const tempKey = `${FALLBACK_PREFIX}${storeName}:importing`;
      storage.setItem(tempKey, JSON.stringify(store));
      tempKeys.push([storeName, tempKey]);
    }
    for (const [storeName, tempKey] of tempKeys) {
      storage.setItem(`${FALLBACK_PREFIX}${storeName}`, storage.getItem(tempKey) || '{}');
      storage.removeItem(tempKey);
    }
  } catch (error) {
    for (const [, tempKey] of tempKeys) {
      try {
        storage.removeItem(tempKey);
      } catch (cleanupError) {
        // Ignore cleanup failures; the original data remains under the final keys.
      }
    }
    throw new Error('本地存储空间不足，导入已取消，原数据未覆盖');
  }
}

function readFallbackStore(storeName) {
  const storage = getFallbackStorage();
  if (storage) {
    try {
      return JSON.parse(storage.getItem(`${FALLBACK_PREFIX}${storeName}`) || '{}');
    } catch (error) {
      return {};
    }
  }
  return memoryFallbackStores[storeName] || {};
}

function writeFallbackStore(storeName, store) {
  const storage = getFallbackStorage();
  if (storage) {
    try {
      storage.setItem(`${FALLBACK_PREFIX}${storeName}`, JSON.stringify(store));
      return;
    } catch (error) {
      fallbackStorage = null;
      // Fall through to memory storage if localStorage is unavailable or full.
    }
  }
  memoryFallbackStores[storeName] = store;
}

function getFallbackStorage() {
  if (fallbackStorage !== undefined) {
    return fallbackStorage;
  }
  try {
    if (typeof localStorage === 'undefined') {
      fallbackStorage = null;
      return fallbackStorage;
    }
    const testKey = `${FALLBACK_PREFIX}test`;
    localStorage.setItem(testKey, '1');
    localStorage.removeItem(testKey);
    fallbackStorage = localStorage;
    return fallbackStorage;
  } catch (error) {
    fallbackStorage = null;
    return fallbackStorage;
  }
}

function requestToPromise(request) {
  return new Promise((resolve, reject) => {
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

function txDone(tx) {
  return new Promise((resolve, reject) => {
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
    tx.onabort = () => reject(tx.error);
  });
}

function renderChart(points) {
  if (!points.length) {
    return '<div class="empty">暂无可绘制数据。</div>';
  }

  const values = points.map((point) => point.value);
  const min = Math.min(...values, 0);
  const max = Math.max(...values, 100);
  const width = 640;
  const height = 240;
  const padding = 34;
  const plotWidth = width - padding * 2;
  const plotHeight = height - padding * 2;
  const coords = points.map((point, index) => {
    const x = padding + (points.length === 1 ? plotWidth / 2 : (index / (points.length - 1)) * plotWidth);
    const y = padding + plotHeight - ((point.value - min) / Math.max(max - min, 1)) * plotHeight;
    return { x, y, point };
  });
  const path = coords.map((coord, index) => `${index === 0 ? 'M' : 'L'} ${coord.x} ${coord.y}`).join(' ');
  const area = `${path} L ${coords.at(-1).x} ${height - padding} L ${coords[0].x} ${height - padding} Z`;

  return `
    <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="成绩趋势图">
      <defs>
        <linearGradient id="scoreArea" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35" />
          <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.08" />
        </linearGradient>
      </defs>
      <line x1="${padding}" y1="${height - padding}" x2="${width - padding}" y2="${height - padding}" stroke="#94a3b8" />
      <line x1="${padding}" y1="${padding}" x2="${padding}" y2="${height - padding}" stroke="#94a3b8" />
      <path d="${area}" fill="url(#scoreArea)" />
      <path d="${path}" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      ${coords.map((coord) => `<circle cx="${coord.x}" cy="${coord.y}" r="5" fill="#2563eb"><title>${escapeHtml(coord.point.label)}：${coord.point.value}</title></circle>`).join('')}
    </svg>
  `;
}

function bindImportExportView() {
  const templateForm = document.querySelector('#template-form');
  templateForm?.stage.addEventListener('change', () => {
    templateForm.grade.innerHTML = renderGradeOptions(templateForm.stage.value, '');
  });
  templateForm?.addEventListener('submit', (event) => {
    event.preventDefault();
    const csv = buildBlankTemplateFromForm(templateForm);
    downloadText(csv, `成绩空模板-${todayString()}.csv`, 'text/csv;charset=utf-8');
  });
  document.querySelector('#download-template-excel')?.addEventListener('click', () => {
    const excel = buildBlankTemplateFromFormExcel(templateForm);
    downloadText(excel, `成绩空模板-${todayString()}.xls`, 'application/vnd.ms-excel;charset=utf-8');
  });

  document.querySelector('#import-score-file')?.addEventListener('click', async () => {
    const file = document.querySelector('#score-import-file').files[0];
    if (!file) {
      showMessage('请先选择填写后的 CSV 模板', 'error');
      return;
    }

    const result = parseScoreTemplateCsv(await file.text());
    const resultBox = document.querySelector('#import-result');
    if (result.errors.length) {
      resultBox.innerHTML = `<strong>导入失败</strong>${result.errors.map((error) => `<p>第 ${error.row} 行 ${escapeHtml(error.column)}：${escapeHtml(error.message)}</p>`).join('')}`;
      return;
    }

    let savedCount = 0;
    let skippedCount = 0;
    for (const importedRecord of result.records) {
      const student = await ensureStudent(importedRecord);
      const record = createScoreRecord({
        ...importedRecord,
        studentId: student.id,
        studentName: student.name,
        birthMonth: student.birthMonth,
      });
      if (findDuplicateScore(state.scores, record)) {
        skippedCount += 1;
        continue;
      }
      await putItem('scores', record);
      state.scores.push(record);
      savedCount += 1;
    }
    await loadData();
    resultBox.innerHTML = `<strong>导入完成</strong>已生成 ${savedCount} 条成绩记录${skippedCount ? `，跳过 ${skippedCount} 条重复记录` : ''}。`;
  });

  document.querySelector('#export-form')?.addEventListener('submit', (event) => {
    event.preventDefault();
    const filters = Object.fromEntries(new FormData(event.currentTarget));
    const records = filterScores(filters);
    downloadText(exportRecordsToCsv(records), `成绩导出-${todayString()}.csv`, 'text/csv;charset=utf-8');
  });
  document.querySelector('#export-filtered-excel')?.addEventListener('click', () => {
    const form = document.querySelector('#export-form');
    const records = filterScores(Object.fromEntries(new FormData(form)));
    downloadText(exportRecordsToExcelHtml(records), `成绩导出-${todayString()}.xls`, 'application/vnd.ms-excel;charset=utf-8');
  });

  document.querySelector('#export-backup')?.addEventListener('click', async () => {
    const backup = await exportBackup();
    downloadText(JSON.stringify(backup, null, 2), `学生成绩记录备份-${todayString()}.json`, 'application/json;charset=utf-8');
  });

  document.querySelector('#backup-import-file')?.addEventListener('change', async (event) => {
    const file = event.currentTarget.files[0];
    if (!file) return;
    try {
      const payload = JSON.parse(await file.text());
      const validation = validateBackupPayload(payload);
      const resultBox = document.querySelector('#backup-import-result');
      if (!validation.ok) {
        resultBox.innerHTML = `<strong>备份校验失败</strong>${validation.errors.slice(0, 8).map((error) => `<p>${escapeHtml(error)}</p>`).join('')}`;
        return;
      }
      resultBox.innerHTML = `<strong>备份预览</strong><p>学生 ${validation.summary.students} 个，成绩 ${validation.summary.scores} 条。导入会覆盖当前全部数据。</p>`;
      if (!window.confirm(`即将导入备份：学生 ${validation.summary.students} 个，成绩 ${validation.summary.scores} 条。导入前会自动下载当前数据备份，确定继续吗？`)) {
        return;
      }
      const currentBackup = await exportBackup();
      downloadText(JSON.stringify(currentBackup, null, 2), `导入前自动备份-${todayString()}.json`, 'application/json;charset=utf-8');
      await importBackup(validation.payload);
      await refresh('备份已导入');
    } catch (error) {
      showMessage(error.message, 'error');
    }
    event.currentTarget.value = '';
  });
}

function readEntryRecord(options = {}) {
  const form = document.querySelector('#entry-form');
  const student = state.students.find((item) => item.id === form.studentId.value);
  const subjects = [...form.querySelectorAll('[data-subject-raw]')].map((rawInput) => {
    const name = rawInput.dataset.subjectRaw;
    const ratioInput = form.querySelector(`[data-subject-ratio="${cssAttrEscape(name)}"]`);
    const rawRankInput = form.querySelector(`[data-subject-raw-rank="${cssAttrEscape(name)}"]`);
    const convertedRankInput = form.querySelector(`[data-subject-converted-rank="${cssAttrEscape(name)}"]`);
    return {
      name,
      rawScore: Number(rawInput.value || 0),
      ratio: Number(ratioInput.value || 1),
      rawRank: rawRankInput.value ? Number(rawRankInput.value) : undefined,
      convertedRank: convertedRankInput.value ? Number(convertedRankInput.value) : undefined,
    };
  });
  const ranks = {};

  if (!options.allowEmpty && subjects.every((subject) => subject.rawScore === 0)) {
    throw new Error('请至少录入一个科目的成绩');
  }

  return createScoreRecord({
    id: options.draft ? 'draft-score-entry' : state.editingScoreId || undefined,
    studentId: student.id,
    studentName: student.name,
    birthMonth: student.birthMonth,
    stage: form.stage.value,
    grade: form.grade.value,
    semester: form.semester.value,
    examType: form.examType.value,
    examDate: form.examDate.value || todayString(),
    subjects,
    ranks,
    totalRanks: {
      rawRank: form.totalRawRank.value ? Number(form.totalRawRank.value) : undefined,
      convertedRank: form.totalConvertedRank.value ? Number(form.totalConvertedRank.value) : undefined,
    },
    createdAt: state.editingScoreId ? state.scores.find((score) => score.id === state.editingScoreId)?.createdAt : undefined,
  });
}

function updateEntryTotals() {
  const form = document.querySelector('#entry-form');
  const subjects = [...form.querySelectorAll('[data-subject-raw]')].map((rawInput) => {
    const name = rawInput.dataset.subjectRaw;
    const ratioInput = form.querySelector(`[data-subject-ratio="${cssAttrEscape(name)}"]`);
    const rawScore = Number(rawInput.value || 0);
    const ratio = Number(ratioInput.value || 1);
    const convertedScore = Math.round(rawScore * ratio * 100) / 100;
    form.querySelector(`[data-subject-converted="${cssAttrEscape(name)}"]`).textContent = convertedScore;
    return { name, rawScore, ratio, convertedScore };
  });
  const totals = calculateTotals(subjects);
  document.querySelector('#entry-total-raw').textContent = totals.totalRawScore;
  document.querySelector('#entry-total-converted').textContent = totals.totalConvertedScore;
}

function buildBlankTemplateOptionsFromForm(form) {
  const student = state.students.find((item) => item.id === form.studentId.value);
  return {
    studentName: student?.name || '',
    birthMonth: student?.birthMonth || '',
    stage: form.stage.value,
    grade: form.grade.value,
    semester: form.semester.value,
    examType: form.examType.value,
    examDate: form.examDate.value || todayString(),
    subjects: getSubjectsForGrade(
      form.stage.value,
      form.grade.value,
      state.settings.subjectTemplates,
      state.settings.subjectRatios,
    ),
    enabledRanks: state.settings.enabledRanks,
  };
}

async function ensureStudent(importedRecord) {
  const existing = state.students.find((student) => student.name === importedRecord.studentName);
  if (existing) return existing;

  const now = new Date().toISOString();
  const student = {
    id: createId('student'),
    name: importedRecord.studentName,
    gender: '其他',
    birthMonth: importedRecord.birthMonth || '',
    currentStage: importedRecord.stage,
    currentGrade: importedRecord.grade,
    createdAt: now,
    updatedAt: now,
  };
  await putItem('students', student);
  state.students.push(student);
  return student;
}

function filterScores(filters) {
  return state.scores.filter((score) => {
    return (
      (!filters.studentId || score.studentId === filters.studentId) &&
      (!filters.stage || score.stage === filters.stage) &&
      (!filters.semester || score.semester === filters.semester) &&
      (!filters.examType || score.examType === filters.examType)
    );
  });
}

function getSelectedStudent() {
  return state.students.find((student) => student.id === state.entry.studentId) || state.students[0];
}

function getCurrentEntryRecord() {
  if (state.entryRecord) {
    return state.entryRecord;
  }
  if (state.editingScoreId) {
    return state.scores.find((score) => score.id === state.editingScoreId) || null;
  }
  return null;
}

function getAllSubjects() {
  const subjects = new Set();
  for (const templatesByGrade of Object.values(state.settings.subjectTemplates)) {
    for (const subjectsForGrade of Object.values(templatesByGrade)) {
      subjectsForGrade.forEach((subject) => subjects.add(subject));
    }
  }
  return [...subjects];
}

function formatRatios(ratios = {}) {
  return Object.entries(ratios)
    .map(([subject, ratio]) => `${subject}=${ratio}`)
    .join('\n');
}

function parseRatios(text) {
  const ratios = {};
  for (const line of text.split(/\n+/)) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    const [subject, ratioText] = trimmed.split(/[=＝:：]/).map((item) => item.trim());
    const ratio = Number(ratioText);
    if (subject && Number.isFinite(ratio) && ratio > 0) {
      ratios[subject] = ratio;
    }
  }
  return ratios;
}

async function refresh(message) {
  await loadData();
  if (!state.students.some((student) => student.id === state.entry.studentId)) {
    hydrateEntryDefaults();
  }
  render();
  showMessage(message);
}

function showMessage(message, type = 'success') {
  document.querySelector('.message')?.remove();
  const node = document.createElement('div');
  node.className = `message ${type === 'error' ? 'error' : ''}`;
  node.textContent = message;
  document.body.append(node);
  setTimeout(() => node.remove(), 3200);
}

function downloadText(content, filename, type) {
  const blob = new Blob([type.startsWith('text/csv') ? `\uFEFF${content}` : content], { type });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
  URL.revokeObjectURL(link.href);
}

function renderOptions(options, selectedValue) {
  return options.map((option) => `<option value="${escapeHtml(option)}" ${option === selectedValue ? 'selected' : ''}>${escapeHtml(option)}</option>`).join('');
}

function renderGradeOptions(stage, selectedValue) {
  const grades = Object.keys(state.settings?.subjectTemplates?.[stage] || DEFAULT_SUBJECT_TEMPLATES[stage] || {});
  return grades.map((grade) => `<option value="${escapeHtml(grade)}" ${grade === selectedValue ? 'selected' : ''}>${escapeHtml(grade)}</option>`).join('');
}

function cssAttrEscape(value) {
  return String(value).replaceAll('\\', '\\\\').replaceAll('"', '\\"');
}

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}
